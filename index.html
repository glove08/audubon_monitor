<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Audubon">
<meta name="theme-color" content="#f4efe3">
<meta name="description" content="Monitor Birds of America print listings across 7 dealer sources">
<title>Audubon Print Monitor</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --d: 'Cormorant Garamond', Georgia, serif;
  --g: 'EB Garamond', Georgia, serif;
  --s: 'DM Sans', -apple-system, sans-serif;
  --bg: #f4efe3;
  --card: rgba(255,252,245,.55);
  --card-new: rgba(255,250,238,.95);
  --border: #d4c9a8;
  --text: #2a2016;
  --muted: #8a7e6b;
  --faint: #a09080;
  --accent: #c4501a;
  --brown: #5a4a2e;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { max-width: 100vw; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--g);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #c9b99a; border-radius: 3px; }
input:focus, select:focus { outline: none; border-color: #8b6030 !important; }
button, select, input, a, .tap {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
@keyframes spin { to { transform: rotate(360deg) } }
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes slideUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
.loading-screen {
  position: fixed; inset: 0; background: var(--bg); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  transition: opacity .4s ease;
}
.loading-screen.done { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 32px; height: 32px; border: 2px solid #d4c9a844;
  border-top-color: var(--faint); border-radius: 50%; animation: spin .8s linear infinite;
}
.listing-card { }
@media (hover: hover) {
  .card-wrap:hover .zoom-overlay { background: rgba(30,25,15,.12) !important; }
  .card-wrap:hover .zoom-label { opacity: 1 !important; }
  .listing-card:hover { border-color: #8b6030 !important; box-shadow: 0 3px 14px rgba(100,60,20,.09); }
  .nav-btn:hover { background: rgba(30,25,15,.7) !important; }
  .gallery-link:hover { background: rgba(255,255,255,.08) !important; }
  .watch-btn:hover { background: rgba(30,25,15,.75) !important; }
}
.price-scroll::-webkit-scrollbar { height: 3px; }
.price-scroll::-webkit-scrollbar-thumb { background: #c9b99a; border-radius: 3px; }
.listings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  overflow: hidden;
  max-width: 100%;
}
@media (max-width: 640px) {
  .listings-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px;
    width: 100% !important;
  }
  .listing-card { font-size: 0.85em; overflow: hidden; max-width: 100%; }
  .listing-card * { min-width: 0 !important; max-width: 100%; }
  .card-wrap { overflow: hidden; min-width: 0; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<div class="loading-screen" id="loader">
  <div style="font-family:var(--d);font-size:24px;font-weight:300;color:var(--text)">Audubon Print Monitor</div>
  <div class="loading-spinner"></div>
  <div style="font-family:var(--s);font-size:10px;color:var(--faint);letter-spacing:.06em">LOADING LISTINGS</div>
</div>

<script type="text/babel">
const {useState,useMemo,useRef,useCallback,useEffect} = React;

/* ═══ CONSTANTS ═══ */
const ARTSY_COLOR="#2a4a6e";
const SRC_C={"The Old Print Shop":"#7c5830","Princeton Audubon":"#2e6e48","Antique Audubon":"#8b3a2a","Audubon Art":"#1a5a6e","Panteek":"#6b5033","Invaluable":"#a07818","LiveAuctioneers":"#5c1a6e","eBay":"#e53238","Seth Kaller":"#2d5a88","Ken Sanders Books":"#6b4423","Argosy Books":"#3a6b3a","Village Lights Books":"#886622","Burnside Rare Books":"#4a2a5a","James Cummins":"#225566","Donald Heald":"#663333","Max Rambod":"#335544","Old Florida Bookshop":"#cc6633","Susan Rhein":"#7a4a6a"};
const ED_C={"Havell":"#9b1b30","Bien":"#5c2d82","Octavo 1st Ed":"#2a6040","Octavo Later Ed":"#7b6848","Octavo":"#5a7a3e"};
const ED_ABBR={"Octavo 1st Ed":"Oct 1","Octavo Later Ed":"Oct Late"};
const SRC_ABBR={"The Old Print Shop":"OPS","Princeton Audubon":"PA","Antique Audubon":"AA","Audubon Art":"AudArt","Panteek":"Pntk","Invaluable":"Inv","LiveAuctioneers":"LA","eBay":"eBay","Seth Kaller":"SK","Ken Sanders Books":"KS","Argosy Books":"Argy","Village Lights Books":"VL","Burnside Rare Books":"Burn","James Cummins":"JC","Donald Heald":"DH","Max Rambod":"MR","Old Florida Bookshop":"OFB","Susan Rhein":"SR"};
const srcColor=l=>SRC_C[l.source]||(l.source_key==="artsy"?ARTSY_COLOR:"#888");
const srcAbbr=l=>SRC_ABBR[l.source]||(l.source_key==="artsy"?"Artsy":l.source.slice(0,4));
const fmt=n=>n==null?"Inquire":n>=10000?`$${(n/1000).toFixed(0)}k`:n>=1000?`$${(n/1000).toFixed(1)}k`:`$${n}`;
const fmtF=n=>n==null?"Price on request":`$${n.toLocaleString()}`;

/* ═══ PRICE DROPS ═══ */
function PriceDrops({changes,onDetail,listings}){
  const drops=useMemo(()=>{const cutoff=new Date(Date.now()-48*60*60*1000).toISOString();return(changes||[]).filter(c=>c.change<0&&c.detected&&c.detected>=cutoff).sort((a,b)=>Math.abs(b.change_pct)-Math.abs(a.change_pct));},[changes]);
  const listingMap=useMemo(()=>{const m={};(listings||[]).forEach(l=>{m[l.id]=l;});return m;},[listings]);

  if(!drops.length) return(
    <div style={{background:"rgba(255,252,245,.6)",border:"1px solid var(--border)",borderRadius:3,padding:"10px 12px",marginBottom:12}}>
      <div style={{fontFamily:"var(--s)",fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>Price Drops</div>
      <div style={{fontFamily:"var(--s)",fontSize:11,color:"var(--faint)",fontStyle:"italic"}}>No price drops detected yet — drops appear after multiple scans</div>
    </div>
  );

  return(
    <div style={{background:"rgba(255,252,245,.6)",border:"1px solid var(--border)",borderRadius:3,padding:"10px 12px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontFamily:"var(--s)",fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)"}}>Price Drops</div>
        <div style={{fontFamily:"var(--s)",fontSize:9,color:"var(--faint)"}}>{drops.length} drop{drops.length!==1?"s":""}</div>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,scrollbarWidth:"thin",WebkitOverflowScrolling:"touch"}} className="price-scroll">
        {drops.map(c=>{
          const full=listingMap[c.id];
          const pct=Math.abs(c.change_pct);
          const fmtP=c.price>=1000?`$${(c.price/1000).toFixed(1)}k`:`$${c.price}`;
          return(
            <div key={c.id} onClick={()=>full&&onDetail(full)}
              style={{flexShrink:0,width:110,borderRadius:4,overflow:"hidden",cursor:full?"pointer":"default",position:"relative",border:"1px solid #2a7a3a18"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"#2a7a3a",opacity:.5,zIndex:1}}/>
              <div style={{width:"100%",height:110,background:"#ece4d4",position:"relative",overflow:"hidden"}}>
                {c.image_url
                  ?<img src={c.image_url} alt={c.title} referrerPolicy="no-referrer"
                      style={{width:"100%",height:"100%",objectFit:"contain",padding:3,background:"#f0e8d8"}}
                      onError={e=>e.target.style.display="none"}/>
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b8ad96" strokeWidth="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                  </div>}
                <div style={{position:"absolute",top:5,right:5,background:"rgba(34,120,50,.88)",backdropFilter:"blur(4px)",borderRadius:8,padding:"2px 6px",fontFamily:"var(--s)",fontSize:10,fontWeight:600,color:"#fff"}}>&#8595; {pct.toFixed(0)}%</div>
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(20,16,8,.72))",padding:"14px 5px 5px",fontFamily:"var(--d)",fontSize:13,color:"#fff",fontWeight:500,textAlign:"center"}}>{fmtP}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══ WATCH LIST ═══ */
function WatchCard({l,onRemove,onDetail,onImage}){
  const[loaded,setLoaded]=useState(false);
  const thumb=l.images?.[0];
  return(
    <div style={{flexShrink:0,width:162,background:"rgba(255,252,245,.88)",border:"1px solid var(--border)",borderRadius:4,overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"#d4820a",opacity:.7,zIndex:2}}/>
      <button className="watch-btn" onClick={e=>{e.stopPropagation();onRemove(l.id);}}
        style={{position:"absolute",top:7,right:7,zIndex:3,width:24,height:24,borderRadius:"50%",border:"none",
          background:"rgba(30,25,15,.52)",backdropFilter:"blur(4px)",cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",color:"#e8dcc8",fontSize:12,lineHeight:1,transition:"background .15s"}}>
        &#10005;
      </button>
      <div onClick={()=>onImage(l)} style={{width:"100%",height:130,background:"#ece4d4",cursor:"pointer",overflow:"hidden",position:"relative"}}>
        {thumb
          ?<img src={thumb} alt={l.title} referrerPolicy="no-referrer"
              onLoad={()=>setLoaded(true)}
              style={{width:"100%",height:"100%",objectFit:"contain",padding:3,background:"#f0e8d8",opacity:loaded?1:0,transition:"opacity .3s"}}
              onError={e=>e.target.style.display="none"}/>
          :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#b8ad96" strokeWidth="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>}
        {!loaded&&thumb&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:18,height:18,border:"2px solid #d4c9a844",borderTopColor:"var(--faint)",borderRadius:"50%",animation:"spin .8s linear infinite"}}/></div>}
      </div>
      <div onClick={()=>onDetail(l)} style={{padding:"7px 9px 9px",cursor:"pointer"}}>
        <div style={{fontFamily:"var(--d)",fontSize:16,lineHeight:1.1,marginBottom:3}}>{fmt(l.price)}</div>
        <div style={{fontFamily:"var(--g)",fontSize:11,fontStyle:"italic",lineHeight:1.3,marginBottom:5,
          display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{l.title}</div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:4}}>
          <span style={{fontSize:8.5,fontFamily:"var(--s)",letterSpacing:".05em",textTransform:"uppercase",
            color:ED_C[l.edition]||"#888",border:`1px solid ${(ED_C[l.edition]||"#888")}35`,
            background:`${(ED_C[l.edition]||"#888")}08`,padding:"1px 5px",borderRadius:2,fontWeight:600,lineHeight:"14px"}}>
            {ED_ABBR[l.edition]||l.edition}
          </span>
          {l.plate&&<span style={{fontSize:8.5,color:"var(--faint)",fontFamily:"var(--s)",lineHeight:"14px"}}>Pl.{l.plate}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,fontFamily:"var(--s)",color:"#9a8e7b"}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:srcColor(l),flexShrink:0}}/>
          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.source}</span>
        </div>
      </div>
    </div>
  );
}

function WatchList({listings,watchedIds,onRemove,onDetail,onImage}){
  const watched=useMemo(()=>listings.filter(l=>watchedIds.has(l.id)),[listings,watchedIds]);
  if(!watched.length) return null;
  return(
    <div style={{background:"rgba(255,252,245,.6)",border:"1px solid var(--border)",borderRadius:3,padding:"10px 12px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontFamily:"var(--s)",fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)"}}>Watch List</div>
        <div style={{fontFamily:"var(--s)",fontSize:9,color:"var(--faint)"}}>{watched.length} item{watched.length!==1?"s":""}</div>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,scrollbarWidth:"thin",WebkitOverflowScrolling:"touch"}} className="price-scroll">
        {watched.map(l=><WatchCard key={l.id} l={l} onRemove={onRemove} onDetail={onDetail} onImage={onImage}/>)}
      </div>
    </div>
  );
}

/* ═══ SCROLL TO TOP ═══ */
function ScrollToTop(){
  const[show,setShow]=useState(false);
  const lastY=useRef(0);
  useEffect(()=>{
    const h=()=>{
      const y=window.scrollY;
      if(y>320&&y<lastY.current)setShow(true);
      else if(y<=100||y>lastY.current)setShow(false);
      lastY.current=y;
    };
    window.addEventListener("scroll",h,{passive:true});
    return()=>window.removeEventListener("scroll",h);
  },[]);
  if(!show)return null;
  return(
    <button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
      style={{position:"fixed",bottom:`calc(22px + var(--safe-bottom))`,right:14,zIndex:500,
        width:38,height:38,borderRadius:"50%",border:"1px solid var(--border)",
        background:"rgba(250,246,236,.92)",backdropFilter:"blur(8px)",
        boxShadow:"0 2px 14px rgba(60,40,10,.14)",cursor:"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",
        color:"var(--brown)",fontSize:17,fontWeight:400,
        animation:"slideUp .2s ease"}}>
      &#8679;
    </button>
  );
}

/* ═══ ZOOMABLE IMAGE ═══ */
function ZoomableImage({src,alt,onSwipe,isActive}){
  const cRef=useRef(null);
  const s=useRef({scale:1,x:0,y:0,startDist:0,startScale:1,startX:0,startY:0,startPanX:0,startPanY:0,
    isPinching:false,isPanning:false,lastTap:0,tapX:0,tapY:0,swipeStartX:0,swipeStartY:0,hasMoved:false,tst:0});
  const[tf,setTf]=useState({scale:1,x:0,y:0});
  const[loaded,setLoaded]=useState(false);
  const[failed,setFailed]=useState(false);

  useEffect(()=>{Object.assign(s.current,{scale:1,x:0,y:0});setTf({scale:1,x:0,y:0});setLoaded(false);setFailed(false);},[src,isActive]);

  const clamp=useCallback((x,y,sc)=>{
    if(sc<=1)return{x:0,y:0};const c=cRef.current;if(!c)return{x,y};
    const r=c.getBoundingClientRect(),mx=(r.width*(sc-1))/2,my=(r.height*(sc-1))/2;
    return{x:Math.max(-mx,Math.min(mx,x)),y:Math.max(-my,Math.min(my,y))};
  },[]);

  const apply=useCallback((sc,x,y)=>{
    const scale=Math.max(1,Math.min(5,sc)),c=clamp(x,y,scale);
    Object.assign(s.current,{scale,x:c.x,y:c.y});setTf({scale,...c});
  },[clamp]);

  const dist=t=>Math.sqrt((t[0].clientX-t[1].clientX)**2+(t[0].clientY-t[1].clientY)**2);

  const zoomTo=useCallback((cx,cy,target)=>{
    const c=cRef.current;if(!c)return;const r=c.getBoundingClientRect();
    const rx=cx-r.left-r.width/2,ry=cy-r.top-r.height/2;
    apply(target,-rx*(target-1),-ry*(target-1));
  },[apply]);

  const onTS=useCallback(e=>{
    const st=s.current,t=e.touches;st.tst=Date.now();st.hasMoved=false;
    if(t.length===2){e.preventDefault();st.isPinching=true;st.isPanning=false;st.startDist=dist(t);st.startScale=st.scale;
      const cx=(t[0].clientX+t[1].clientX)/2,cy=(t[0].clientY+t[1].clientY)/2;st.startPanX=cx-st.x;st.startPanY=cy-st.y;
    }else if(t.length===1){st.isPinching=false;
      if(st.scale>1){st.isPanning=true;st.startX=t[0].clientX-st.x;st.startY=t[0].clientY-st.y;}
      else{st.isPanning=false;st.swipeStartX=t[0].clientX;st.swipeStartY=t[0].clientY;}
      st.tapX=t[0].clientX;st.tapY=t[0].clientY;
    }
  },[]);

  const onTM=useCallback(e=>{
    const st=s.current,t=e.touches;
    if(st.isPinching&&t.length===2){e.preventDefault();st.hasMoved=true;
      const nd=dist(t),ns=st.startScale*(nd/st.startDist);
      const cx=(t[0].clientX+t[1].clientX)/2,cy=(t[0].clientY+t[1].clientY)/2;
      apply(ns,cx-st.startPanX,cy-st.startPanY);
    }else if(t.length===1){
      const dx=t[0].clientX-st.tapX,dy=t[0].clientY-st.tapY;
      if(Math.abs(dx)>5||Math.abs(dy)>5)st.hasMoved=true;
      if(st.scale>1){e.preventDefault();apply(st.scale,t[0].clientX-st.startX,t[0].clientY-st.startY);}
    }
  },[apply]);

  const onTE=useCallback(e=>{
    const st=s.current;
    if(st.isPinching){st.isPinching=false;if(st.scale<1.1)apply(1,0,0);return;}
    if(st.scale<=1&&st.hasMoved&&e.changedTouches.length===1){
      const dx=e.changedTouches[0].clientX-st.swipeStartX,dy=e.changedTouches[0].clientY-st.swipeStartY;
      if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){onSwipe?.(dx<0?"next":"prev");return;}
    }
    if(!st.hasMoved&&Date.now()-st.tst<300){
      const now=Date.now();
      if(now-st.lastTap<350){st.scale>1?apply(1,0,0):zoomTo(st.tapX,st.tapY,2.8);st.lastTap=0;}
      else{st.lastTap=now;setTimeout(()=>{if(s.current.lastTap===now){st.scale>1?apply(1,0,0):zoomTo(st.tapX,st.tapY,2.8);}},320);}
    }
  },[apply,onSwipe,zoomTo]);

  const onWheel=useCallback(e=>{
    e.preventDefault();const st=s.current,d=e.deltaY>0?.85:1.18,ns=st.scale*d;
    if(ns<=1){apply(1,0,0);return;}
    const r=cRef.current.getBoundingClientRect(),rx=e.clientX-r.left-r.width/2,ry=e.clientY-r.top-r.height/2;
    apply(ns,st.x-rx*(d-1),st.y-ry*(d-1));
  },[apply]);

  const onMD=useCallback(e=>{const st=s.current;if(st.scale<=1)return;st.isPanning=true;st.startX=e.clientX-st.x;st.startY=e.clientY-st.y;e.preventDefault();},[]);
  const onMM=useCallback(e=>{const st=s.current;if(!st.isPanning||st.scale<=1)return;apply(st.scale,e.clientX-st.startX,e.clientY-st.startY);},[apply]);
  const onMU=useCallback(()=>{s.current.isPanning=false;},[]);
  const onDC=useCallback(e=>{s.current.scale>1?apply(1,0,0):zoomTo(e.clientX,e.clientY,2.8);},[apply,zoomTo]);

  return(
    <div ref={cRef} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
      onWheel={onWheel} onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU} onDoubleClick={onDC}
      style={{width:"100%",height:"100%",overflow:"hidden",touchAction:"none",display:"flex",alignItems:"center",justifyContent:"center",
        cursor:tf.scale>1?"grab":"zoom-in",userSelect:"none",WebkitUserSelect:"none"}}>
      {failed?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,color:"#a09080",fontFamily:"var(--s)",fontSize:13}}>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#b0a890" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Image unavailable</div>
      ):(

/* ═══ PRICE HISTORY (detail panel) ═══ */
const AUCTION_SOURCES=new Set(["liveauctioneers","invaluable","la_results"]);
const BUYER_PREMIUM=1.28;

function normT(t){
  return(t||"")
    .toLowerCase()
    .replace(/\baudubon\b|\bj\.?j\.?\b|\bbirds? of america\b|\bbirds?\b|\boctavo\b|\b8vo\b|\bhavell\b|\bbien\b|\bplate\b|\bpl\.\b|\b1st\b|\bfirst\b|\bed\.?\b|\bedition\b|\broyal\b|\boriginal\b|\bantique\b|\bprint\b|\blithograph\b|\bbilled\b/g," ")
    .replace(/[^a-z\s]/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function titleMatch(a,b){
  const wa=new Set(normT(a).split(" ").filter(w=>w.length>2));
  const wb=normT(b).split(" ").filter(w=>w.length>2);
  if(!wa.size||!wb.length)return false;
  const hits=wb.filter(w=>wa.has(w)).length;
  // Require at least 2 matching words AND >=60% of the shorter title's words.
  // Math.max(2,...) prevents threshold collapsing to 1 on short titles, which
  // caused e.g. "Snowy Owl" matching "Tengmalms Night Owl" via just "owl".
  return hits>=Math.max(2,Math.ceil(Math.min(wa.size,wb.length)*0.6));
}

function matchSalesHistory(listing,sales){
  if(!sales||!sales.length)return[];
  return sales.filter(r=>{
    if(r.id===listing.id)return true;
    // Target-field match: if both records have a target and they agree,
    // that's a strong explicit signal — use it directly.
    // This handles short species names (e.g. "Snowy Owl") where stripping
    // generic bird words leaves too few tokens for title matching.
    if(r.target&&listing.target&&r.target===listing.target){
      if(r.edition&&listing.edition&&r.edition!==listing.edition)return false;
      return true;
    }
    // Otherwise fall back to title-based matching.
    if(!titleMatch(r.title,listing.title))return false;
    if(r.edition&&listing.edition&&r.edition!==listing.edition)return false;
    return true;
  }).sort((a,b)=>(b.disappeared_at||"").localeCompare(a.disappeared_at||""));
}

function effectivePrice(r){
  if(!r.price)return null;
  return AUCTION_SOURCES.has(r.source_key)?Math.round(r.price*BUYER_PREMIUM):r.price;
}

function PriceHistory({listing,sales,dismissed,onDismiss}){
  const allMatches=useMemo(()=>matchSalesHistory(listing,sales),[listing,sales]);
  const matches=useMemo(()=>allMatches.filter(r=>!dismissed.has(r.id)),[allMatches,dismissed]);
  if(!allMatches.length)return null;
  // avg only over reliable confirmed sales — exclude DNS and price_reliable:false
  const withPrice=matches.filter(r=>r.price&&r.price_reliable!==false&&r.event_type!=="dns");
  const avg=withPrice.length?Math.round(withPrice.reduce((s,r)=>s+effectivePrice(r),0)/withPrice.length):null;
  const fmtD=d=>{try{return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch{return"";}};
  const srcShort=r=>{
    const sk=r.source_key||"";
    if(sk==="liveauctioneers"||sk==="la_results")return"LiveAuctioneers";
    if(sk==="invaluable")return"Invaluable";
    return r.source||sk;
  };
  // ✓ = sold, ✗ = DNS, ↩ = sold/removed (price unknown)
  const evtIcon=e=>e==="auction_ended"||e==="sold_at_ask"?"✓":e==="dns"?"✗":"↩";
  const evtColor=e=>e==="dns"?"#9a7050":e==="sold_or_removed"||e==="sold_at_ask"||e==="auction_ended"?"var(--text)":"var(--muted)";
  return(
    <div style={{marginTop:14,borderTop:"1px dashed #d4c9a8",paddingTop:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontFamily:"var(--s)",fontSize:9,color:"#7a8a9a",letterSpacing:".07em",textTransform:"uppercase"}}>Price History</div>
        {allMatches.length!==matches.length&&<div style={{fontFamily:"var(--s)",fontSize:8,color:"var(--faint)"}}>{allMatches.length-matches.length} hidden</div>}
      </div>
      {matches.length===0&&(
        <div style={{fontFamily:"var(--s)",fontSize:10,color:"var(--faint)",fontStyle:"italic",padding:"4px 0"}}>All entries dismissed</div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {matches.map((r,i)=>{
          const ep=effectivePrice(r);
          const hasPremium=AUCTION_SOURCES.has(r.source_key)&&r.price&&r.event_type!=="dns";
          return(
            <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",
              background:"rgba(240,236,228,.6)",borderRadius:3,border:"1px solid #e0d8c8"}}>
              <span style={{fontSize:10,lineHeight:1,flexShrink:0,minWidth:14,textAlign:"center"}}>{evtIcon(r.event_type)}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"var(--s)",fontSize:9.5,fontWeight:500,color:evtColor(r.event_type)}}>
                  {ep?`$${ep.toLocaleString()}`:r.event_type==="dns"?`$${r.price?.toLocaleString()} — DNS`:"—"}
                  {hasPremium&&<span style={{fontFamily:"var(--s)",fontSize:7.5,color:"var(--faint)",marginLeft:4}}>incl. 28% BP</span>}
                </div>
                <div style={{fontFamily:"var(--s)",fontSize:8.5,color:"var(--muted)",marginTop:1}}>
                  {srcShort(r)}
                  {r.price_note&&r.price_note!=="listed price"&&r.price_note!=="did not sell"&&<span style={{color:"var(--faint)",marginLeft:4}}>· {r.price_note}</span>}
                </div>
              </div>
              <div style={{fontFamily:"var(--s)",fontSize:8,color:"var(--faint)",flexShrink:0,marginRight:2}}>{fmtD(r.disappeared_at)}</div>
              <button
                onClick={e=>{e.stopPropagation();onDismiss(r.id);}}
                title="Dismiss"
                style={{flexShrink:0,width:16,height:16,borderRadius:"50%",border:"none",
                  background:"rgba(120,100,80,.15)",cursor:"pointer",padding:0,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#b0a090",fontSize:9,lineHeight:1,transition:"background .15s,color .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(196,80,26,.18)";e.currentTarget.style.color="#c4501a";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(120,100,80,.15)";e.currentTarget.style.color="#b0a090";}}
              >&#10005;</button>
            </div>
          );
        })}
      </div>
      {avg&&withPrice.length>1&&(
        <div style={{marginTop:8,padding:"6px 8px",background:"rgba(90,74,46,.07)",borderRadius:3,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"var(--s)",fontSize:9,color:"var(--muted)",letterSpacing:".04em",textTransform:"uppercase"}}>Avg sale ({withPrice.length})</span>
          <span style={{fontFamily:"var(--d)",fontSize:15,color:"var(--text)"}}>${avg.toLocaleString()}</span>
        </div>
      )}
    </div>
  );
}

/* ═══ RECENTLY ENDED FEED ═══ */
function RecentlySold({sales,dismissed,onDismiss}){
  if(!sales||sales.length===0)return null;
  const visible=useMemo(()=>sales
    .filter(r=>!dismissed.has(r.id))
    .sort((a,b)=>(b.disappeared_at||"").localeCompare(a.disappeared_at||""))
    .slice(0,40)
  ,[sales,dismissed]);
  if(!visible.length)return null;
  const totalVisible=sales.filter(r=>!dismissed.has(r.id)).length;
  const fmtD=d=>{if(!d)return"";try{
    const dt=new Date(d);
    // Year-only dates (Jan 1 midnight) — show just the year
    if(dt.getMonth()===0&&dt.getDate()===1)return dt.getFullYear().toString();
    return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  }catch{return"";}}
  // Event type → human label + color
  const evtTag=e=>{
    if(e==="sold_at_ask") return{text:"Sold at Ask",bg:"#2a7a3a",color:"#fff"};
    if(e==="auction_ended") return{text:"Sold",      bg:"#2a5a8a",color:"#fff"};
    if(e==="dns")           return{text:"DNS",       bg:"#8a6820",color:"#fff"};
    /* sold_or_removed */   return{text:"Sold?",     bg:"#6a6050",color:"#fff"};
  };
  const priceDisplay=r=>{
    if(r.event_type==="dns")return{label:`${r.price?.toLocaleString()}`,sub:null,muted:true};
    if(!r.price||r.price_reliable===false)return{label:null,sub:null,muted:true};
    const sk=r.source_key||"";
    const ep=AUCTION_SOURCES.has(sk)?Math.round(r.price*BUYER_PREMIUM):r.price;
    return{label:`${ep.toLocaleString()}`,sub:AUCTION_SOURCES.has(sk)&&sk!=="la_results"?"incl. BP":null,muted:false};
  };
  return(
    <div style={{background:"rgba(255,252,245,.6)",border:"1px solid var(--border)",borderRadius:3,padding:"10px 12px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontFamily:"var(--s)",fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)"}}>Recently Ended</div>
        <div style={{fontFamily:"var(--s)",fontSize:9,color:"var(--faint)"}}>{totalVisible} records</div>
      </div>
      <div className="price-scroll" style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,scrollbarWidth:"thin",WebkitOverflowScrolling:"touch"}}>
        {visible.map((r,i)=>{
          const pd=priceDisplay(r);
          const isDNS=r.event_type==="dns";
          return(
            <div key={r.id||i} style={{flexShrink:0,width:110,borderRadius:4,overflow:"hidden",position:"relative",
              border:`1px solid ${isDNS?"#c4a88040":"#c4b89040"}`,
              background:isDNS?"rgba(250,244,234,.5)":"rgba(255,252,245,.9)"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,
                background:isDNS?"#c4a060":"#5a8a5a",opacity:.6,zIndex:1}}/>
              <button onClick={e=>{e.stopPropagation();onDismiss(r.id);}}
                style={{position:"absolute",top:5,right:5,zIndex:10,width:15,height:15,borderRadius:"50%",
                  border:"none",background:"rgba(30,20,10,.5)",color:"#e8dcc8",fontSize:8,
                  lineHeight:1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>&#10005;</button>
              <div style={{width:"100%",height:90,background:"#ece4d4",overflow:"hidden",position:"relative"}}>
                {r.image_url
                  ?<img src={r.image_url} alt="" referrerPolicy="no-referrer"
                      style={{width:"100%",height:"100%",objectFit:"contain",padding:2,background:"#f0e8d8",
                        filter:isDNS?"grayscale(40%)":"none"}}
                      onError={e=>e.target.style.display="none"}/>
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b8ad96" strokeWidth="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>}
                {r.target&&<div style={{position:"absolute",top:4,left:5,fontSize:9,color:"#2a7a3a",lineHeight:1}}>&#9733;</div>}
                  {/* event type tag */}
                  {(()=>{const t=evtTag(r.event_type);return(
                  <div style={{position:"absolute",bottom:5,right:5,
                  background:t.bg,color:t.color,
                  fontFamily:"var(--s)",fontSize:7,fontWeight:600,letterSpacing:".04em",
                    padding:"1.5px 5px",borderRadius:2,lineHeight:1.4}}>{t.text}</div>
              );})()}
            </div>
            <div style={{padding:"5px 7px 7px"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:3,marginBottom:1,flexWrap:"wrap"}}>
                {pd.label
                  ?<span style={{fontFamily:"var(--d)",fontSize:14,color:pd.muted?"var(--muted)":"var(--text)",lineHeight:1}}>${pd.label}</span>
                  :<span style={{fontFamily:"var(--s)",fontSize:10,color:"var(--faint)",fontStyle:"italic",lineHeight:1}}>price n/a</span>}
                {pd.sub&&<span style={{fontFamily:"var(--s)",fontSize:7,color:"var(--faint)",lineHeight:1}}>{pd.sub}</span>}
              </div>
                <div style={{fontFamily:"var(--g)",fontSize:9.5,fontStyle:"italic",color:"var(--muted)",lineHeight:1.25,
                  display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden",marginBottom:4}}>{r.title}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontFamily:"var(--s)",fontSize:7.5,color:"var(--faint)"}}>{SRC_ABBR[r.source]||r.source?.slice(0,4)||""}</span>
                  <span style={{fontFamily:"var(--s)",fontSize:7.5,color:"var(--faint)"}}>{fmtD(r.disappeared_at)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══ MAIN APP ═══ */
function App(){
  const[data,setData]=useState(null);
  const[salesData,setSalesData]=useState([]);
  const[error,setError]=useState(null);
  const[newOnly,setNewOnly]=useState(false);
  const[src,setSrc]=useState("All");
  const[ed,setEd]=useState("All");
  const[sort,setSort]=useState("price-desc");
  const[q,setQ]=useState("");
  const[gallery,setGallery]=useState(null);
  const[detail,setDetail]=useState(null);
  const[filtersOpen,setFiltersOpen]=useState(false);
  const[targetOnly,setTargetOnly]=useState(false);
  const[endingSoon,setEndingSoon]=useState(false);
  const[watchedIds,setWatchedIds]=useState(()=>{
    try{return new Set(JSON.parse(localStorage.getItem("audubon_watchlist")||"[]"));}
    catch{return new Set();}
  });
  const[dismissedHistory,setDismissedHistory]=useState(()=>{
    try{return new Set(JSON.parse(localStorage.getItem("audubon_dismissed_history")||"[]"));}
    catch{return new Set();}
  });
  const dismissHistoryEntry=useCallback((id)=>{
    setDismissedHistory(prev=>{
      const next=new Set(prev);
      next.add(id);
      try{localStorage.setItem("audubon_dismissed_history",JSON.stringify([...next]));}catch{}
      return next;
    });
  },[]);
  const[dismissedSales,setDismissedSales]=useState(()=>{
    try{return new Set(JSON.parse(localStorage.getItem("audubon_dismissed_sales")||"[]"));}
    catch{return new Set();}
  });
  const dismissSaleEntry=useCallback((id)=>{
    setDismissedSales(prev=>{
      const next=new Set(prev);
      next.add(id);
      try{localStorage.setItem("audubon_dismissed_sales",JSON.stringify([...next]));}catch{}
      return next;
    });
  },[]);

  const toggleWatch=useCallback((id)=>{
    setWatchedIds(prev=>{
      const next=new Set(prev);
      if(next.has(id))next.delete(id);else next.add(id);
      try{localStorage.setItem("audubon_watchlist",JSON.stringify([...next]));}catch{}
      return next;
    });
  },[]);

  useEffect(()=>{
    const ts=Date.now();
    Promise.all([
      fetch("data/listings.json?"+ts).then(r=>{if(!r.ok)throw new Error("Failed");return r.json();}),
      fetch("data/sales_history.json?"+ts).then(r=>r.ok?r.json():[]).catch(()=>[])
    ]).then(([d,s])=>{
      setData(d);
      setSalesData(Array.isArray(s)?s:[]);
      document.getElementById("loader")?.classList.add("done");
      setTimeout(()=>{document.getElementById("loader")?.remove();},500);
    }).catch(e=>{setError(e.message);document.getElementById("loader")?.classList.add("done");});
  },[]);

  // Titles that appear in both sales history and current listings = relisted or scan glitch.
  // Uses verbatim title match. Strip is_new from those listings and hide them from Recently Ended.
  const endedTitleSet=useMemo(()=>new Set((salesData||[]).map(r=>r.title)),[salesData]);
  const LISTINGS=(data?.listings||[]).map(l=>({...l,
    images: l.images || (l.image_url ? [l.image_url] : []),
    is_new: l.is_new && !endedTitleSet.has(l.title)
  }));
  const activeTitleSet=useMemo(()=>new Set(LISTINGS.map(l=>l.title)),[LISTINGS]);
  const filteredSales=useMemo(()=>(salesData||[]).filter(r=>!activeTitleSet.has(r.title)),[salesData,activeTitleSet]);
  const meta=data?.metadata||{last_scan: data?.last_run};
  const sources=useMemo(()=>["All",...[...new Set(LISTINGS.map(x=>x.source))].sort()],[LISTINGS]);
  const editions=useMemo(()=>["All",...[...new Set(LISTINGS.map(x=>x.edition))]],[LISTINGS]);

  const items=useMemo(()=>{
    let r=[...LISTINGS];
    if(newOnly)r=r.filter(x=>x.is_new);
    if(targetOnly)r=r.filter(x=>x.target);
    if(endingSoon){const n=new Date().toISOString(),n24=new Date(Date.now()+86400000).toISOString();r=r.filter(x=>x.ends_at&&x.ends_at>n&&x.ends_at<=n24);}
    if(src!=="All")r=r.filter(x=>x.source===src);
    if(ed!=="All")r=r.filter(x=>x.edition===ed);
    if(q){const s=q.toLowerCase();r=r.filter(x=>x.title.toLowerCase().includes(s)||(x.desc||"").toLowerCase().includes(s)||(x.plate&&x.plate.toString()===s));}
    if(sort==="price-desc")r.sort((a,b)=>{
      if(a.is_new&&!b.is_new)return -1;
      if(!a.is_new&&b.is_new)return 1;
      return(b.price||0)-(a.price||0);
    });
    if(sort==="price-asc")r.sort((a,b)=>(a.price||1e9)-(b.price||1e9));
    if(sort==="newly-listed")r.sort((a,b)=>{
      const aDate=a.first_seen||a.listed_at||"";
      const bDate=b.first_seen||b.listed_at||"";
      return bDate.localeCompare(aDate);
    });
    if(sort==="ending-soon")r.sort((a,b)=>{
      const aEnd=a.ends_at||"";
      const bEnd=b.ends_at||"";
      if(!aEnd&&!bEnd)return 0;
      if(!aEnd)return 1;
      if(!bEnd)return -1;
      return aEnd.localeCompare(bEnd);
    });
    if(sort==="plate")r.sort((a,b)=>(a.plate||999)-(b.plate||999));
    return r;
  },[LISTINGS,newOnly,targetOnly,endingSoon,src,ed,sort,q]);

  const newCount=LISTINGS.filter(x=>x.is_new).length;
  const srcCounts=useMemo(()=>{const c={};LISTINGS.forEach(x=>{c[x.source]=(c[x.source]||0)+1});return c;},[LISTINGS]);
  const targetCount=LISTINGS.filter(x=>x.target).length;
  const now24=new Date(Date.now()+24*60*60*1000).toISOString();
  const nowISO=new Date().toISOString();
  const endingSoonCount=LISTINGS.filter(x=>x.ends_at&&x.ends_at>nowISO&&x.ends_at<=now24).length;
  const af=(src!=="All"?1:0)+(ed!=="All"?1:0)+(newOnly?1:0)+(targetOnly?1:0)+(q?1:0);

  if(error)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:40,textAlign:"center"}}>
      <div style={{fontFamily:"var(--d)",fontSize:28,marginBottom:8}}>Audubon Print Monitor</div>
      <div style={{fontFamily:"var(--s)",fontSize:13,color:"var(--accent)",marginBottom:16}}>Could not load listings data</div>
      <div style={{fontFamily:"var(--s)",fontSize:11,color:"var(--muted)",maxWidth:360,lineHeight:1.6}}>
        Make sure <code style={{background:"#e8e0cc",padding:"1px 5px",borderRadius:2}}>data/listings.json</code> exists.
        Run <code style={{background:"#e8e0cc",padding:"1px 5px",borderRadius:2}}>python3 audubon_scraper.py</code> to generate it.</div>
    </div>
  );
  if(!data)return null;

  return(
    <div style={{minHeight:"100vh",backgroundImage:"radial-gradient(ellipse at 15% 50%,rgba(120,70,20,.025) 0%,transparent 60%),radial-gradient(ellipse at 85% 15%,rgba(40,80,50,.025) 0%,transparent 60%)"}}>
      <ScrollToTop/>
      {gallery&&<ImageGallery listing={gallery} onClose={()=>setGallery(null)}/>}
      {detail&&!gallery&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,25,15,.55)",backdropFilter:"blur(4px)",zIndex:999,
          display:"flex",flexDirection:"column",animation:"fadeIn .15s ease"}}>
          <button onClick={()=>setDetail(null)} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            width:"100%",padding:"14px 16px",background:"rgba(30,25,15,.8)",border:"none",borderBottom:"1px solid #ffffff15",
            color:"#d4c9a8",fontFamily:"var(--s)",fontSize:13,cursor:"pointer",flexShrink:0}}>&#8592; Back to listings</button>
          <div style={{flex:1,overflow:"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#faf6ec",border:"1px solid #c9bda0",borderRadius:5,maxWidth:480,width:"100%",
              padding:20,animation:"fadeUp .25s ease",position:"relative"}}>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>
                <Badge text={detail.edition} color={ED_C[detail.edition]||"#888"}/>
                {detail.is_new&&<Badge text="&#9679; New" color="var(--accent)"/>}
                {detail.target&&<Badge text={`&#9733; ${detail.target}`} color="#2a7a3a"/>}
                {detail.plate&&<span style={{fontSize:10,color:"#9a8e7b",fontFamily:"var(--s)"}}>Plate {detail.plate}</span>}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:4}}>
                <h2 style={{fontFamily:"var(--g)",fontSize:18,fontWeight:400,fontStyle:"italic",lineHeight:1.3,flex:1}}>{detail.title}</h2>
                <button onClick={()=>toggleWatch(detail.id)}
                  style={{flexShrink:0,width:32,height:32,borderRadius:"50%",border:"1px solid var(--border)",
                    background:watchedIds.has(detail.id)?"rgba(212,130,10,.15)":"transparent",
                    cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:16,color:watchedIds.has(detail.id)?"#d4820a":"var(--muted)"}}>
                  {watchedIds.has(detail.id)?"★":"☆"}
                </button>
              </div>
              <div style={{fontFamily:"var(--d)",fontSize:24,marginBottom:10}}>{fmtF(detail.price)}</div>
              {detail.images?.length>0&&(
                <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
                  {detail.images.map((img,i)=>(
                    <div key={i} onClick={()=>{setGallery(detail);setDetail(null);}} style={{width:64,height:64,borderRadius:3,overflow:"hidden",cursor:"pointer",
                      border:"1px solid var(--border)",flexShrink:0,background:"#ece4d4"}}>
                      <img src={img} alt="" referrerPolicy="no-referrer" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/></div>
                  ))}
                </div>
              )}
              <p style={{fontFamily:"var(--s)",fontSize:12,color:"#6b6050",lineHeight:1.6,marginBottom:12}}>{detail.desc}</p>
              <PriceHistory listing={detail} sales={salesData} dismissed={dismissedHistory} onDismiss={dismissHistoryEntry}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid #e5dcc8",paddingTop:10,marginTop:12,flexWrap:"wrap",gap:8}}>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:11,fontFamily:"var(--s)",color:"#7b7060"}}>
                  <span style={{width:7,height:7,borderRadius:"50%",background:srcColor(detail)}}/>{detail.source}</span>
                <div style={{display:"flex",gap:6}}>
                  {detail.images?.length>0&&<button onClick={()=>{setGallery(detail);setDetail(null);}} style={{fontFamily:"var(--s)",fontSize:11,color:"#6b5a3c",background:"none",
                    border:"1px solid var(--border)",padding:"5px 12px",borderRadius:3,cursor:"pointer"}}>Images ({detail.images.length})</button>}
                  <a href={detail.url} target="_blank" rel="noopener noreferrer" style={{fontFamily:"var(--s)",fontSize:11,fontWeight:500,color:"#faf5e8",background:"var(--brown)",
                    padding:"5px 12px",borderRadius:3,textDecoration:"none"}}>View listing &#8594;</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{position:"relative",width:"100%",height:180,overflow:"hidden"}}>
        <img src="louisiana_heron_bg.jpg" alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",display:"block"}}/>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"0 16px 10px"}}>
          <div style={{maxWidth:1100,margin:"0 auto",display:"flex",gap:6}}>
            {[{l:"Listings",v:items.length,s:`of ${LISTINGS.length}`},{l:"New",v:newCount,s:"flagged",a:true,click:()=>{setNewOnly(!newOnly);setEndingSoon(false);}},{l:"Ending Soon",v:endingSoonCount,s:"within 24h",e:endingSoonCount>0,click:()=>{setEndingSoon(!endingSoon);setNewOnly(false);if(!endingSoon)setSort("ending-soon");}},
              {l:"Range",v:items.length?`${fmt(Math.min(...items.filter(x=>x.price).map(x=>x.price)))}–${fmt(Math.max(...items.filter(x=>x.price).map(x=>x.price)))}`:"—"}
            ].map((c,i)=>(
              <div key={i} className={c.click?"tap":undefined} onClick={c.click||undefined} style={{background:c.click&&((c.a&&newOnly)||(c.e&&endingSoon))?"rgba(90,74,46,.9)":"rgba(255,252,245,.8)",backdropFilter:"blur(6px)",border:"1px solid rgba(212,201,168,.5)",borderRadius:3,padding:"7px 10px",flex:1,minWidth:0,position:"relative",overflow:"hidden",cursor:c.click?"pointer":"default",color:c.click&&((c.a&&newOnly)||(c.e&&endingSoon))?"#faf5e8":"inherit"}}>
                {c.a&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"var(--accent)"}}/>}
                {c.e&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"#d4820a"}}/>}
                <div style={{fontSize:8.5,fontFamily:"var(--s)",letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:1}}>{c.l}</div>
                <div style={{fontSize:18,fontFamily:"var(--d)",lineHeight:1.1}}>{c.v}</div>
                {c.s&&<div style={{fontSize:8.5,color:"var(--faint)",fontFamily:"var(--s)",marginTop:1}}>{c.s}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:10}}>
          <div>
            <h1 style={{fontFamily:"var(--d)",fontSize:22,fontWeight:300}}>Audubon Print Monitor</h1>
            <p style={{fontFamily:"var(--s)",fontSize:9,color:"#9a8e7b",letterSpacing:".04em",marginTop:1}}>Havell · Bien · Octavo — {sources.length-1} sources</p>
          </div>
          <div style={{fontFamily:"var(--s)",fontSize:9,color:"var(--faint)",textAlign:"right"}}>
            {meta.last_scan&&`${new Date(meta.last_scan).toLocaleDateString("en-US",{month:"short",day:"numeric"})} · ${new Date(meta.last_scan).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`}
          </div>
        </div>

        <WatchList listings={LISTINGS} watchedIds={watchedIds} onRemove={toggleWatch} onDetail={setDetail} onImage={setGallery}/>
        <PriceDrops changes={data?.price_changes||[]} onDetail={setDetail} listings={LISTINGS}/>
        <RecentlySold sales={filteredSales} dismissed={dismissedSales} onDismiss={dismissSaleEntry}/>

        <div style={{marginBottom:12,paddingBottom:10,borderBottom:"1px solid #e5dcc8"}}>
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search species, plate #…" style={{
              fontFamily:"var(--s)",fontSize:11,padding:"5px 11px",border:"1px solid var(--border)",borderRadius:14,background:"rgba(255,252,245,.8)",color:"var(--text)",width:155}}/>
            <Pill label={`New (${newCount})`} active={newOnly} onClick={()=>setNewOnly(!newOnly)}/>
            <Pill label={`Targets (${targetCount})`} active={targetOnly} onClick={()=>setTargetOnly(!targetOnly)}/>
            <button onClick={()=>setFiltersOpen(!filtersOpen)} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",fontSize:10,
              fontFamily:"var(--s)",cursor:"pointer",border:filtersOpen||af>1?"1px solid var(--brown)":"1px solid #cfc4a8",borderRadius:14,
              background:filtersOpen?"var(--brown)":"transparent",color:filtersOpen?"#faf5e8":"#6b5a3c"}}>
              Filters{af>1&&` (${af})`}<span style={{fontSize:8,transform:filtersOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>&#9660;</span>
            </button>
            <div style={{flex:1}}/>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={{fontFamily:"var(--s)",fontSize:10,padding:"4px 8px",border:"1px solid var(--border)",
              borderRadius:3,background:"rgba(255,252,245,.8)",color:"#6b5a3c",cursor:"pointer"}}>
              <option value="price-desc">Price ↓</option><option value="price-asc">Price ↑</option><option value="newly-listed">Newly Listed</option><option value="ending-soon">Ending Soonest</option><option value="plate">Plate #</option>
            </select>
          </div>
          {filtersOpen&&(
            <div style={{marginTop:8,animation:"fadeUp .2s ease"}}>
              <div style={{marginBottom:6}}>
                <div style={{fontFamily:"var(--s)",fontSize:9,color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:4}}>Source</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {sources.map(s=>{const dummy={source:s,source_key:s.toLowerCase()};return<Pill key={s} label={s==="All"?s:srcAbbr(dummy)} active={src===s} onClick={()=>setSrc(s)} count={s==="All"?LISTINGS.length:srcCounts[s]}/>;})}
                </div>
              </div>
              <div>
                <div style={{fontFamily:"var(--s)",fontSize:9,color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:4}}>Edition</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {editions.map(e=><Pill key={e} label={e} active={ed===e} onClick={()=>setEd(e)}/>)}
                </div>
              </div>
            </div>
          )}
        </div>

        <div style={{fontFamily:"var(--s)",fontSize:10.5,color:"var(--muted)",marginBottom:8}}>
          {items.length} listing{items.length!==1?"s":""}{newOnly?" (new only)":""}{targetOnly?" (targets)":""}{src!=="All"?` · ${src}`:""}{ed!=="All"?` · ${ed}`:""}
        </div>

        <div className="listings-grid">
          {items.map((l,i)=><div key={l.id} className="card-wrap"><ListingCard listing={l} index={i} onImage={setGallery} onDetail={setDetail} onWatch={toggleWatch} watched={watchedIds.has(l.id)}/></div>)}
        </div>

        {items.length===0&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:"var(--faint)"}}>
            <div style={{fontFamily:"var(--d)",fontSize:22,marginBottom:6}}>No listings match</div>
            <div style={{fontFamily:"var(--s)",fontSize:12}}>Try adjusting your filters</div>
          </div>
        )}

        <footer style={{marginTop:28,paddingTop:12,borderTop:"1px solid var(--border)",
          fontFamily:"var(--s)",fontSize:9,color:"#b0a890",paddingBottom:`calc(16px + var(--safe-bottom))`,textAlign:"center",lineHeight:1.6}}>
          Audubon Print Monitor · {sources.length-1} sources · Powered by audubon_scraper.py
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
